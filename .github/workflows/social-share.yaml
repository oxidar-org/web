name: Share new posts to social media

on:
  workflow_run:
    workflows: ["Deploy Hugo site to Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      test_post:
        description: 'Post path to share (e.g. content/posts/2026.01.26-rustconf-2026-cfp/rustconf-2026-cfp.md)'
        required: false
        type: string

permissions:
  contents: read
  models: read
  issues: write

defaults:
  run:
    shell: bash

jobs:
  generate:
    name: Generate messages and create review issues
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts
        id: detect
        run: |
          if [ -n "${{ inputs.test_post }}" ]; then
            echo "Using manually provided post: ${{ inputs.test_post }}"
            echo "${{ inputs.test_post }}" > /tmp/new_posts.txt
            echo "has_posts=true" >> "$GITHUB_OUTPUT"
          else
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/' | grep '\.md$' || true)
            POSTS=$(echo "$NEW_FILES" | grep -v '\.en\.md$' | grep -v '_index\.md' | grep -v '^$' || true)
            if [ -z "$POSTS" ]; then
              echo "No new posts detected."
              echo "has_posts=false" >> "$GITHUB_OUTPUT"
            else
              echo "New posts detected:"
              echo "$POSTS"
              echo "$POSTS" > /tmp/new_posts.txt
              echo "has_posts=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.has_posts == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.detect.outputs.has_posts == 'true'
        run: pip install -r scripts/social_share/requirements.txt

      - name: Generate messages and create review issues
        if: steps.detect.outputs.has_posts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/social_share/main.py \
            --posts-file /tmp/new_posts.txt \
            --config .github/social-media-config.yaml \
            --create-issues
